<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <title>Stripe 欄位 iframe（模擬 js.stripe.com）</title>
  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; margin: 0; padding: 12px;
           background: #f6f9fc; color: #32325d; font-size: 13px; }
    .hint { color: #8898aa; font-size: 11px; margin-bottom: 8px; }
    label { display: block; margin: 8px 0; }
    span { display: block; font-size: 11px; color: #8898aa; margin-bottom: 2px; }
    input { width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #cfd7df;
            border-radius: 6px; font-size: 14px; }
  </style>
</head>
<body>
  <div class="hint">↑ 這是模擬 Stripe Elements 的跨 frame 欄位（透過 postMessage 接收填入指令）</div>
  <label><span>Card number</span><input name="cardnumber" autocomplete="cc-number" inputmode="numeric" placeholder="1234 1234 1234 1234" /></label>
  <label><span>Expiry</span><input name="exp-date" autocomplete="cc-exp" placeholder="MM / YY" /></label>
  <label><span>CVC</span><input name="cvc" autocomplete="cc-csc" placeholder="CVC" /></label>

  <script type="module">
    // 模擬 Stripe iframe：直接重用外掛真實的 frame 監聽器，驗證跨 frame postMessage 協定。
    import { registerStripeFrameListener } from '../src/adapters/stripe.js';
    registerStripeFrameListener(window);
  </script>
</body>
</html>
