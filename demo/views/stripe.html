<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Stripe 測試刷卡頁（Card Element）</title>
  <script src="https://js.stripe.com/v3"></script>
  <style>
    body { font-family: -apple-system, "Microsoft JhengHei", sans-serif; background: #f6f9fc;
           color: #32325d; margin: 0; padding: 40px; }
    .box { max-width: 460px; margin: 0 auto; background: #fff; border-radius: 12px;
           box-shadow: 0 2px 16px rgba(0,0,0,.08); padding: 28px; }
    h1 { font-size: 16px; margin: 0 0 4px; }
    .hint { font-size: 12.5px; color: #8898aa; margin: 0 0 20px; line-height: 1.5; }
    label { display: block; font-size: 12px; color: #525f7f; margin: 14px 0 5px; }
    .field { padding: 11px 12px; border: 1px solid #e0e6ed; border-radius: 7px; background: #fff; }
    #pay { margin-top: 20px; width: 100%; padding: 11px; background: #635bff; color: #fff;
           border: 0; border-radius: 7px; font-size: 14px; cursor: pointer; }
    #pay:disabled { background: #b3b0f5; cursor: default; }
    #msg { margin-top: 12px; font-size: 13px; min-height: 18px; }
    .err { color: #cd3d64; } .ok { color: #2b8a3e; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Stripe 測試刷卡頁</h1>
    <p class="hint">下方三個欄位是真實的 js.stripe.com 跨網域 iframe。載入本外掛後，右下角面板點測試卡即會跨 frame 填入。
       測試卡 <b>4242 4242 4242 4242</b>、任意未來到期、任意 CVC。</p>
    <label>卡號</label><div class="field" id="card-number"></div>
    <label>到期日</label><div class="field" id="card-expiry"></div>
    <label>安全碼</label><div class="field" id="card-cvc"></div>
    <button id="pay">送出付款（需 sk_test）</button>
    <div id="msg"></div>
  </div>

  <script>
    let stripe, cardNumber;
    fetch('/config.json').then((r) => r.json()).then((cfg) => {
      if (!cfg.stripePublishableKey) {
        document.getElementById('msg').innerHTML =
          '<span class="err">尚未設定 STRIPE_PUBLISHABLE_KEY，請填 .env 後重啟。</span>';
        return;
      }
      stripe = Stripe(cfg.stripePublishableKey);
      const elements = stripe.elements();
      // Card Element 分離欄位：各自為獨立 js.stripe.com iframe，input name 較穩定。
      cardNumber = elements.create('cardNumber');
      cardNumber.mount('#card-number');
      elements.create('cardExpiry').mount('#card-expiry');
      elements.create('cardCvc').mount('#card-cvc');
      document.getElementById('pay').canConfirm = cfg.stripeCanConfirm;
    });

    document.getElementById('pay').addEventListener('click', async () => {
      const msg = document.getElementById('msg');
      msg.className = ''; msg.textContent = '建立付款中…';
      try {
        const r = await fetch('/stripe/intent', { method: 'POST' });
        const data = await r.json();
        if (!r.ok) { msg.className = 'err'; msg.textContent = data.error || '建立 PaymentIntent 失敗（請確認 sk_test）'; return; }
        const result = await stripe.confirmCardPayment(data.clientSecret, { payment_method: { card: cardNumber } });
        if (result.error) { msg.className = 'err'; msg.textContent = result.error.message; }
        else { msg.className = 'ok'; msg.textContent = '付款成功：' + result.paymentIntent.status; }
      } catch (e) {
        msg.className = 'err'; msg.textContent = String(e);
      }
    });
  </script>
</body>
</html>
